<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevEstrella Admin Dashboard</title>
    <link rel="stylesheet" href="css/adminPanel.css">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    

    <header class="global-header">
        <a href="index.html" class="logo-link"><h1 class="logo-text">DevEstrella</h1></a>
        <div class="header-right">
            <p style="color: #94a3b8; font-size: 0.85rem; margin: 0; margin-right: 1rem;">Logged in as: <span id="adminNameDisplay" style="color: white; font-weight: 600;"></span></p>
            <button class="logout-btn" onclick="logoutAdmin()">Secure Logout</button>
        </div>
    </header>

    

    <div class="bg-glow bg-glow-primary"></div>
    <div class="bg-glow bg-glow-secondary"></div>

    <main class="page-container">
        <section class="card card-medium">
        <h1>Command Center</h1>
        <p>Manage your store's inventory, monitor databases, and control system settings from one centralized hub.</p>

        <div class="action-grid">
            <a href="dataBase.html" class="btn-primary">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                Add Items to inventory
            </a>
            
            <a href="qrGenerator.html" class="btn-primary" style="background: linear-gradient(135deg, #8b5cf6, #d946ef);">
                <svg class="icon" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <rect x="7" y="7" width="3" height="3"></rect>
                    <rect x="14" y="7" width="3" height="3"></rect>
                    <rect x="7" y="14" width="3" height="3"></rect>
                    <rect x="14" y="14" width="3" height="3"></rect>
                </svg>
                Generate Product QR Codes
            </a>

            <a href="manageGuards.html" class="btn-primary" style="background: linear-gradient(135deg, #10b981, #059669);">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                Manage Security Guards
            </a>
        </div>

        <a href="index.html" class="btn-secondary">← Back to Main Menu</a>
        </section>
    </main>
    <script src="js/adminPanel.js"></script>
</body>
</html>
