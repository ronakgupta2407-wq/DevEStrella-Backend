<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Security Guards</title>
    <link rel="stylesheet" href="css/manageGuards.css">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <header class="global-header">
        <a href="index.html" class="logo-link"><h1 class="logo-text">DevEstrella</h1></a>
        <div class="header-right">
            <a href="adminPanel.html" class="btn-secondary" style="margin:0; padding: 0.5rem 1rem; color: #94a3b8; text-decoration: none; border: 1px solid #64748b; border-radius: 6px;">← Back</a>
        </div>
    </header>

    <div class="bg-glow bg-glow-primary"></div>
    <div class="bg-glow bg-glow-secondary"></div>

    <main class="page-container">
        <section class="card card-medium">
            <h1 class="card-title">Manage Security Guards</h1>
        
        <form class="add-guard-form" id="guardForm">
            <div class="input-group">
                <label for="guardName">Guard Name</label>
                <input type="text" id="guardName" required placeholder="e.g. John Doe">
            </div>
            <div class="input-group">
                <label for="guardId">Guard ID</label>
                <input type="text" id="guardId" required placeholder="e.g. G-101">
            </div>
            <div class="input-group">
                <label for="guardPassword">Password</label>
                <input type="password" id="guardPassword" required placeholder="Create a password">
            </div>
            <button type="submit">Add New Guard</button>
        </form>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>ID</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody id="guardTableBody">
                    <tr><td colspan="3" class="loading">Loading guards...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    
    <script src="js/manageGuards.js"></script>
</body>
</html>
