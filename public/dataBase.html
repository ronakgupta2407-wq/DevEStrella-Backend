<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Database Generator</title>
    <link rel="stylesheet" href="css/dataBase.css">
    <link rel="stylesheet" href="css/global.css">
</head>

<body>
    <div class="bg-glow bg-glow-primary"></div>
    <div class="bg-glow bg-glow-secondary"></div>

    <header class="global-header">
        <a href="index.html" class="logo-link"><h1 class="logo-text">DevEstrella</h1></a>
        <div class="header-right">
            <a href="adminPanel.html" class="btn-secondary" style="margin-top:0; border: 1px solid #64748b; background: transparent;">← Back</a>
        </div>
    </header>

    <main class="page-container page-grid">
        <section class="card">
            <h2 class="card-header">Add Product</h2>
            <form id="productForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" required placeholder="e.g. Wireless Mouse">
                </div>
                <div class="form-group">
                    <label for="productPrice">Price ($)</label>
                    <input type="number" id="productPrice" step="0.01" min="0" required placeholder="e.g. 29.99">
                </div>
                <div class="form-group">
                    <label for="productQuantity">Quantity</label>
                    <input type="number" id="productQuantity" min="1" required placeholder="e.g. 10">
                </div>
                <button type="submit">Add Product</button>
            </form>
        </section>

        <section class="card">
            <h2 class="card-header">Products to Add</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Product ID</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <!-- Products will be injected here -->
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state">
                    No products added yet. Add some products to generate a CSV!
                </div>
            </div>

            <button class="export-btn" id="exportBtn" style="display: none;" onclick="uploadToSupabase()">
                Save Data to Supabase
            </button>
        </section>
        <a href="adminPanel.html" class="back-link" style="grid-column: 1 / -1;">← Back to Command Center</a>
    </main>

    <footer>
        <p>&copy; 2026 DevEstrella</p>
    </footer>

    
    <script src="js/dataBase.js"></script>
</body>

</html>
