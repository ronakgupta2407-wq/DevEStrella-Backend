<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Security Dashboard</title>
    <link rel="stylesheet" href="css/guard.css">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    
    <header class="global-header">
        <a href="index.html" class="logo-link"><h1 class="logo-text">DevEstrella</h1></a>
        <div class="header-right">
            <p style="margin:0; color:#94a3b8; font-size:0.875rem; margin-right: 1rem;">Guard: <span id="guardNameDisplay" style="color: white; font-weight: bold;"></span></p>
            <button onclick="sessionStorage.removeItem('guardSession'); window.location.href='guardLogin.html';" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-weight: bold;">Logout</button>
        </div>
    </header>

    <div class="bg-glow bg-glow-primary"></div>
    <div class="bg-glow bg-glow-secondary"></div>

    <main class="page-container">
        <section class="card card-small">
            <h2 class="card-header">Scan Customer QR Code</h2>
            <div id="reader"></div>
            
            <!-- Dev Option -->
            <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #334155;">
                <h3 style="font-size: 1rem; color: #94a3b8; margin-top: 0; margin-bottom: 0.5rem;">Manual Override (Dev)</h3>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="devToken" placeholder="Paste Secure Token..." style="flex: 1; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #334155; background: #0f172a; color: white; font-family: 'Inter', sans-serif;">
                    <button onclick="simulateScan()" style="background: #38bdf8; color: #0f172a; padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: bold; font-family: 'Inter', sans-serif;">Simulate</button>
                </div>
            </div>
        </section>

        <div id="statusResult" class="status-box">
            <!-- Injected by JS -->
        </div>
    </main>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script src="js/guard.js"></script>
</body>
</html>
